<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1000" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000">
<defs>
<style>
.layer-title { font-size: 24px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
.box-title { font-size: 16px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
.box-text { font-size: 13px; fill: #ffffff; text-anchor: middle; }
.arrow { stroke: #888888; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
.layer-bg { filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
</style>
<marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#888888" />
</marker>
</defs>

<!-- Background -->
<rect width="1200" height="1000" fill="#0f172a"/>

<!-- Title -->
<text x="600" y="40" class="layer-title" style="font-size: 28px; fill: #e2e8f0;">Arsitektur Sistem Monitoring dan Prediksi Curah Hujan</text>
<text x="600" y="68" class="box-text" style="text-anchor: middle; fill: #94a3b8; font-size: 14px;">STMKG Jawa Barat — Data Integration • Bi-LSTM Deep Learning • Real-time Monitoring</text>

<!-- LAYER 1: DATA SOURCES -->
<g class="layer-bg">
<rect x="50" y="100" width="1100" height="170" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="10"/>
<text x="70" y="130" style="fill: #3b82f6; text-anchor: start; font-size: 16px; font-weight: bold;">LAYER 1: Sumber Data Sensor (50 Stasiun Jawa Barat)</text>

<!-- AWS Box -->
<rect x="100" y="150" width="300" height="100" fill="#1d4ed8" rx="8"/>
<text x="250" y="180" class="box-title">AWS (11 Stasiun)</text>
<text x="250" y="200" class="box-text">Automatic Weather Station</text>
<text x="250" y="220" class="box-text" style="font-size: 11px;">7 Parameter | Interval: 1 menit</text>
<text x="250" y="238" class="box-text" style="font-size: 10px; fill: #93c5fd;">Temp, RH, Press, WS, WD, Rain, SR</text>

<!-- ARG Box -->
<rect x="450" y="150" width="300" height="100" fill="#15803d" rx="8"/>
<text x="600" y="180" class="box-title">ARG (30 Stasiun)</text>
<text x="600" y="200" class="box-text">Automatic Rain Gauge</text>
<text x="600" y="220" class="box-text" style="font-size: 11px;">3 Parameter | Interval: 1 menit</text>
<text x="600" y="238" class="box-text" style="font-size: 10px; fill: #86efac;">Rain, Logger Temp, Battery</text>

<!-- AAWS Box -->
<rect x="800" y="150" width="300" height="100" fill="#c2410c" rx="8"/>
<text x="950" y="180" class="box-title">AAWS (9 Stasiun)</text>
<text x="950" y="200" class="box-text">Automatic Agro Weather Station</text>
<text x="950" y="220" class="box-text" style="font-size: 11px;">7+ Parameter | Interval: 10 menit</text>
<text x="950" y="238" class="box-text" style="font-size: 10px; fill: #fed7aa;">AWS params + Agroklimat</text>
</g>

<!-- Arrows Layer 1 to 2 -->
<path d="M 250 250 L 250 295" class="arrow"/>
<path d="M 600 250 L 600 295" class="arrow"/>
<path d="M 950 250 L 950 295" class="arrow"/>

<!-- LAYER 2: MQTT BROKER -->
<g class="layer-bg">
<rect x="50" y="295" width="1100" height="110" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="10"/>
<text x="70" y="325" style="fill: #a855f7; text-anchor: start; font-size: 16px; font-weight: bold;">LAYER 2: Message Broker (MQTT)</text>

<rect x="150" y="340" width="900" height="50" fill="#7c3aed" rx="8"/>
<text x="600" y="365" class="box-title" style="font-size: 14px;">MQTT Broker BMKG (202.90.198.159:1883)</text>
<text x="600" y="383" class="box-text" style="font-size: 11px;">Protocol: MQTT v5 | QoS: 0 | Publish-Subscribe | Real-time Data Stream</text>
</g>

<!-- Arrow Layer 2 to 3 -->
<path d="M 600 405 L 600 445" class="arrow"/>

<!-- LAYER 3: APPLICATION SERVER -->
<g class="layer-bg">
<rect x="50" y="445" width="1100" height="190" fill="#1e293b" stroke="#06b6d4" stroke-width="2" rx="10"/>
<text x="70" y="475" style="fill: #06b6d4; text-anchor: start; font-size: 16px; font-weight: bold;">LAYER 3: Application Server (Node.js + Express)</text>

<!-- Express API -->
<rect x="100" y="495" width="240" height="120" fill="#0e7490" rx="8"/>
<text x="220" y="520" class="box-title" style="font-size: 13px;">Express REST API</text>
<text x="220" y="545" class="box-text" style="font-size: 11px;">HTTP Endpoints</text>
<text x="220" y="565" class="box-text" style="font-size: 11px;">Data Query &amp; Serve</text>
<text x="220" y="585" class="box-text" style="font-size: 10px; fill: #67e8f9;">Port 3001</text>

<!-- MQTT Client -->
<rect x="370" y="495" width="240" height="120" fill="#0e7490" rx="8"/>
<text x="490" y="520" class="box-title" style="font-size: 13px;">MQTT Subscriber</text>
<text x="490" y="545" class="box-text" style="font-size: 11px;">Receive Sensor Data</text>
<text x="490" y="565" class="box-text" style="font-size: 11px;">Parse &amp; Store</text>
<text x="490" y="585" class="box-text" style="font-size: 10px; fill: #67e8f9;">50 Station Filter</text>

<!-- WebSocket -->
<rect x="640" y="495" width="240" height="120" fill="#0e7490" rx="8"/>
<text x="760" y="520" class="box-title" style="font-size: 13px;">WebSocket Server</text>
<text x="760" y="545" class="box-text" style="font-size: 11px;">Real-time Push</text>
<text x="760" y="565" class="box-text" style="font-size: 11px;">Live Dashboard Update</text>
<text x="760" y="585" class="box-text" style="font-size: 10px; fill: #67e8f9;">Bidirectional</text>

<!-- Prediction Cron -->
<rect x="910" y="495" width="220" height="120" fill="#0e7490" rx="8"/>
<text x="1020" y="520" class="box-title" style="font-size: 13px;">Prediction Cron</text>
<text x="1020" y="545" class="box-text" style="font-size: 11px;">Python Bridge</text>
<text x="1020" y="565" class="box-text" style="font-size: 11px;">Every 6 Hours</text>
<text x="1020" y="585" class="box-text" style="font-size: 10px; fill: #67e8f9;">predict.py</text>
</g>

<!-- Arrows Layer 3 to 4 -->
<path d="M 220 615 L 220 670" class="arrow"/>
<path d="M 490 615 L 490 670" class="arrow"/>
<path d="M 760 615 L 760 670" class="arrow"/>
<path d="M 1020 615 L 1020 670" class="arrow"/>

<!-- LAYER 4: STORAGE & OUTPUT -->
<g class="layer-bg">
<rect x="50" y="670" width="1100" height="200" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="10"/>
<text x="70" y="700" style="fill: #f43f5e; text-anchor: start; font-size: 16px; font-weight: bold;">LAYER 4: Storage, AI Engine &amp; Output</text>

<!-- SQLite -->
<rect x="100" y="720" width="240" height="130" fill="#be123c" rx="8"/>
<text x="220" y="750" class="box-title" style="font-size: 13px;">SQLite</text>
<text x="220" y="775" class="box-text" style="font-size: 11px;">Metadata Database</text>
<text x="220" y="795" class="box-text" style="font-size: 10px;">Stations • Predictions</text>
<text x="220" y="815" class="box-text" style="font-size: 10px;">Alerts • Model Perf</text>
<text x="220" y="835" class="box-text" style="font-size: 10px; fill: #fda4af;">Zero-config, Embedded</text>

<!-- InfluxDB -->
<rect x="370" y="720" width="240" height="130" fill="#be123c" rx="8"/>
<text x="490" y="750" class="box-title" style="font-size: 13px;">InfluxDB</text>
<text x="490" y="775" class="box-text" style="font-size: 11px;">Time-Series Database</text>
<text x="490" y="795" class="box-text" style="font-size: 10px;">Sensor Data History</text>
<text x="490" y="815" class="box-text" style="font-size: 10px;">High-perf Query</text>
<text x="490" y="835" class="box-text" style="font-size: 10px; fill: #fda4af;">Retention Policy</text>

<!-- Browser/Dashboard -->
<rect x="640" y="720" width="240" height="130" fill="#be123c" rx="8"/>
<text x="760" y="750" class="box-title" style="font-size: 13px;">Web Dashboard</text>
<text x="760" y="775" class="box-text" style="font-size: 11px;">Frontend (Browser)</text>
<text x="760" y="795" class="box-text" style="font-size: 10px;">Leaflet Maps • Chart.js</text>
<text x="760" y="815" class="box-text" style="font-size: 10px;">Thiessen Polygon</text>
<text x="760" y="835" class="box-text" style="font-size: 10px; fill: #fda4af;">HTML/CSS/JS</text>

<!-- Python Bi-LSTM -->
<rect x="910" y="720" width="220" height="130" fill="#be123c" rx="8"/>
<text x="1020" y="750" class="box-title" style="font-size: 13px;">Bi-LSTM Engine</text>
<text x="1020" y="775" class="box-text" style="font-size: 11px;">TensorFlow + Keras</text>
<text x="1020" y="795" class="box-text" style="font-size: 10px;">60 Days Input → 7 Days</text>
<text x="1020" y="815" class="box-text" style="font-size: 10px;">Log-transform</text>
<text x="1020" y="835" class="box-text" style="font-size: 10px; fill: #fda4af;">128-64-32 Neurons</text>
</g>

<!-- Footer Stats -->
<rect x="50" y="900" width="1100" height="80" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
<text x="160" y="930" style="font-size: 22px; font-weight: 800; fill: #3b82f6; text-anchor: middle;">50</text>
<text x="160" y="950" style="font-size: 11px; fill: #94a3b8; text-anchor: middle;">Stasiun Aktif</text>
<text x="340" y="930" style="font-size: 22px; font-weight: 800; fill: #22c55e; text-anchor: middle;">3</text>
<text x="340" y="950" style="font-size: 11px; fill: #94a3b8; text-anchor: middle;">Tipe Sensor</text>
<text x="520" y="930" style="font-size: 22px; font-weight: 800; fill: #f97316; text-anchor: middle;">7</text>
<text x="520" y="950" style="font-size: 11px; fill: #94a3b8; text-anchor: middle;">Hari Prediksi</text>
<text x="700" y="930" style="font-size: 22px; font-weight: 800; fill: #a855f7; text-anchor: middle;">1-10</text>
<text x="700" y="950" style="font-size: 11px; fill: #94a3b8; text-anchor: middle;">Menit Interval</text>
<text x="880" y="930" style="font-size: 22px; font-weight: 800; fill: #06b6d4; text-anchor: middle;">24/7</text>
<text x="880" y="950" style="font-size: 11px; fill: #94a3b8; text-anchor: middle;">Real-time</text>
<text x="1060" y="930" style="font-size: 22px; font-weight: 800; fill: #f43f5e; text-anchor: middle;">6 Jam</text>
<text x="1060" y="950" style="font-size: 11px; fill: #94a3b8; text-anchor: middle;">Prediksi Cron</text>

<text x="600" y="975" style="font-size: 11px; fill: #64748b; text-anchor: middle;">© 2026 STMKG Jawa Barat | Integrated Climatology Monitoring System — Skripsi Akmaludien Ramadhan (41220014)</text>
</svg>
