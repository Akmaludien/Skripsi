version: '3.8'

services:
  # ─── All-in-One: InfluxDB + STMKG App ───
  influxdb:
    image: influxdb:2.7
    container_name: stmkg-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    env_file:
      - .env.influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: stmkg-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      influxdb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Docker-specific overrides (override .env values for container networking)
      - NODE_ENV=production
      - PORT=3001
      - INFLUX_URL=http://influxdb:8086
      - PYTHON_CMD=/app/venv/bin/python3
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/stations"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  influxdb-data:
  influxdb-config:
  app-data:
