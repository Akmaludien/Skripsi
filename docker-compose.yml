version: '3.8'

services:
  # ─── STMKG Monitoring App (Node.js + Python) ───
  app:
    build: .
    container_name: stmkg-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - INFLUX_URL=http://host.docker.internal:8087
      - INFLUX_TOKEN=myUb_QRFhHYHhWxY07tJFl4eiG2hQOyQQaFGfSTfeFh_IyoOo5ZUBUXNYqvyhM1T9mgdzn32T6ArK_WmeTo0FA==
      - INFLUX_ORG=SKRIPSI
      - INFLUX_BUCKET=skripsi
      - INFLUX_TIMEOUT=60000
      - MQTT_BROKER=mqtt://202.90.198.159:1883
      - MQTT_USER=bmkg_aws
      - MQTT_PASS=bmkg_aws123
      - PYTHON_CMD=/app/venv/bin/python3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-data:/app/data
      - app-models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/stations"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  app-data:
  app-models:
